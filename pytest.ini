[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    --cov=bot
    --cov=cogs
    --cov=database
    --cov=dashboard
    --cov=metrics
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --verbose
    --tb=short
filterwarnings =
    ignore::DeprecationWarning
