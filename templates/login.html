<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        bg: '#0b0f19', card: '#151c2c', accent: '#4f46e5',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg text-gray-200 flex items-center justify-center min-h-screen p-4">
    <div class="bg-card border border-white/5 rounded-2xl p-8 w-full max-w-sm shadow-2xl relative overflow-hidden">
        <!-- Glow effect -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-accent/20 rounded-full blur-3xl pointer-events-none"></div>
        
        <h2 class="text-3xl font-bold mb-6 bg-gradient-to-br from-indigo-400 to-purple-500 bg-clip-text text-transparent">Sign In</h2>
        
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <input type="text" name="username" required 
                       class="w-full bg-[#0d111a] border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent/50 transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required 
                       class="w-full bg-[#0d111a] border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent/50 transition-all">
            </div>
            
            <button type="submit" 
                    class="w-full bg-accent hover:bg-indigo-600 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-lg shadow-accent/20">
                Authenticate
            </button>
        </form>
        
        {% if error %}
        <div class="mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}
    </div>
</body>
</html>
