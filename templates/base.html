<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Antigravity Bot Dashboard{% endblock %}</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        bg: '#0b0f19',
                        card: '#151c2c',
                        accent: '#4f46e5',
                        accentHover: '#4338ca',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        muted: '#9ca3af',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #070913;
            color: #f3f4f6;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(79, 70, 229, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(139, 92, 246, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.03) 0%, transparent 35%);
            background-attachment: fixed;
            overflow: hidden;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 9999px;
            transition: all 0.3s;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2); 
        }
        
        .glass-panel {
            background: rgba(15, 22, 41, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-panel-hover:hover {
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 40px 0 rgba(99, 102, 241, 0.12);
            transform: translateY(-2px);
        }

        .metric-card-success {
            border-left: 4px solid #10b981;
        }
        .metric-card-success:hover {
            box-shadow: 0 12px 40px 0 rgba(16, 185, 129, 0.12);
        }

        .metric-card-danger {
            border-left: 4px solid #ef4444;
        }
        .metric-card-danger:hover {
            box-shadow: 0 12px 40px 0 rgba(239, 68, 68, 0.12);
        }

        /* Hover animation keyframes */
        @keyframes hoverPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-spin-hover:hover {
            animation: spin 1s ease-in-out infinite;
        }

        [x-cloak] { display: none !important; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="flex h-screen overflow-hidden antialiased">

    <!-- Toast Notification System -->
    <div x-data="{ toasts: [] }" 
         @notify.window="toasts.push({id: Date.now(), msg: $event.detail.msg, type: $event.detail.type || 'info'}); setTimeout(() => toasts.shift(), 3000)"
         class="fixed bottom-4 right-4 z-50 flex flex-col gap-2">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="true" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 translate-y-2"
                 class="px-4 py-3 rounded-lg shadow-lg border text-sm font-semibold flex items-center gap-2"
                 :class="{
                     'bg-green-900/80 border-green-500/50 text-green-100': toast.type === 'success',
                     'bg-red-900/80 border-red-500/50 text-red-100': toast.type === 'error',
                     'bg-blue-900/80 border-blue-500/50 text-blue-100': toast.type === 'info'
                 }">
                 <span x-text="toast.msg"></span>
            </div>
        </template>
    </div>

    <!-- Sidebar component -->
    {% include 'components/sidebar.html' %}

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header component -->
        {% include 'components/header.html' %}

        <!-- Main scrollable area -->
        <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
