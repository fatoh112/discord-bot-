<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Antigravity Bot Dashboard{% endblock %}</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        bg: '#0b0f19',
                        card: '#151c2c',
                        accent: '#4f46e5',
                        accentHover: '#4338ca',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        muted: '#9ca3af',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19; 
        }
        ::-webkit-scrollbar-thumb {
            background: #374151; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563; 
        }
        
        .glass-panel {
            background: rgba(21, 28, 44, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        [x-cloak] { display: none !important; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="flex h-screen overflow-hidden antialiased">

    <!-- Toast Notification System -->
    <div x-data="{ toasts: [] }" 
         @notify.window="toasts.push({id: Date.now(), msg: $event.detail.msg, type: $event.detail.type || 'info'}); setTimeout(() => toasts.shift(), 3000)"
         class="fixed bottom-4 right-4 z-50 flex flex-col gap-2">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="true" 
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 translate-y-2"
                 class="px-4 py-3 rounded-lg shadow-lg border text-sm font-semibold flex items-center gap-2"
                 :class="{
                     'bg-green-900/80 border-green-500/50 text-green-100': toast.type === 'success',
                     'bg-red-900/80 border-red-500/50 text-red-100': toast.type === 'error',
                     'bg-blue-900/80 border-blue-500/50 text-blue-100': toast.type === 'info'
                 }">
                 <span x-text="toast.msg"></span>
            </div>
        </template>
    </div>

    <!-- Sidebar component -->
    {% include 'components/sidebar.html' %}

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header component -->
        {% include 'components/header.html' %}

        <!-- Main scrollable area -->
        <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
